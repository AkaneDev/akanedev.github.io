<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tetris Rogue — Responsive</title>
<style>
  :root{
    --bg:#071122;
    --panel:#0f1724;
    --accent:#ffffff;
    --muted:#ffffff;
  }
  *{box-sizing:border-box;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial;}
  *[class], *[id] { color: #ffffff !important; }
  body{
    margin:0;
    background:linear-gradient(180deg,#051021 0%,#081529 100%);
    color:#ffffff;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    min-height:100vh;
    padding:2vw;
    overflow:hidden;
  }
  .wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:2vw;align-items:flex-start;width:100%;max-width:1200px;}
  .boardWrap{
    background:var(--panel);
    padding:1vw;
    border-radius:12px;
    box-shadow:0 8px 30px rgba(2,6,23,.6);
    flex:1 1 320px;
    display:flex;
    justify-content:center;
  }
  canvas{background:#071025;border-radius:8px;display:block;}
  .side{
    flex:1 1 300px;
    background:linear-gradient(180deg,rgba(255,255,255,.01),transparent);
    padding:1vw;
    border-radius:8px;
    min-width:260px;
  }
  h1{margin:0 0 8px;color:var(--accent);font-size:clamp(1.2rem, 2vw, 1.8rem);}
  .statRow{display:flex;gap:8px;margin-bottom:8px;}
  .card{flex:1;background:rgba(255,255,255,.02);padding:8px;border-radius:8px;text-align:center;font-size:clamp(0.8rem,1.2vw,1rem);}
  .smallCanvas{background:#051217;border-radius:6px;display:block;margin:8px auto;max-width:100%;height:auto;}
  .mods{max-height:200px;overflow:auto;padding:6px;border-radius:6px;background:rgba(255,255,255,.02);font-size:13px;}
  .controls{font-size:13px;color:var(--muted);line-height:1.6;margin-top:8px;}
  .btn{display:inline-block;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.03);cursor:pointer;margin-top:8px;width:100%;font-size:clamp(0.9rem,1.3vw,1rem);}
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.85);
    display:none;align-items:center;justify-content:center;color:#fff;
    flex-direction:column;z-index:99;padding:20px;text-align:center;
  }
  .overlay.active{display:flex;}
  .choice{background:#0b1622;border-radius:8px;padding:12px;margin:8px;cursor:pointer;
          border:1px solid rgba(255,255,255,.03);min-width:260px;width:80%;max-width:320px;}
  .choice:hover{background:#12202a;}
  .muted{color:var(--muted);}
  @media (max-width:900px){
    body{align-items:center;padding:4vw;}
    .wrap{flex-direction:column;align-items:center;}
    .boardWrap{width:100%;max-width:90vw;}
    #board{width:100%;height:auto;}
    .side{width:100%;max-width:90vw;}
    .mods{max-height:150px;}
  }
  @media (max-width:500px){
    .statRow{flex-direction:column;}
    .card{font-size:0.9rem;}
    h1{font-size:1.4rem;}
    .controls{font-size:0.85rem;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="boardWrap">
      <canvas id="board" width="300" height="600"></canvas>
    </div>
    <div class="side">
      <h1>Tetris Rogue</h1>
      <div class="statRow">
        <div class="card">Score<br><strong id="score">0</strong></div>
        <div class="card">Level<br><strong id="level">1</strong></div>
      </div>
      <div class="statRow">
        <div class="card">Lines<br><strong id="lines">0</strong></div>
        <div class="card">Goal<br><strong id="goal">5</strong></div>
      </div>
      <div class="statRow">
        <div class="card">Gold<br><strong id="gold">0</strong></div>
        <div class="card">Shop<br><strong id="shopHint">—</strong></div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;margin-top:6px">
        <div style="flex:1;text-align:center">
          <div class="muted">Hold</div>
          <canvas id="holdCanvas" class="smallCanvas" width="120" height="120"></canvas>
        </div>
        <div style="flex:1;text-align:center">
          <div class="muted">Next</div>
          <canvas id="nextCanvas" class="smallCanvas" width="120" height="120"></canvas>
        </div>
      </div>
      <div style="margin-top:10px">
        <div class="muted">Active Upgrades</div>
        <div id="modsList" class="mods"><em class="muted">None</em></div>
      </div>
      <div class="controls">
        <strong>Controls</strong><br>
        ← / → : Move<br>
        ↑ : Rotate<br>
        ↓ : Soft drop<br>
        Space : Hard drop<br>
        C / Shift : Hold / Swap<br>
        Esc : Restart
      </div>
      <div style="margin-top:12px">
        <button id="btnPause" class="btn">Pause</button>
        <button id="btnRestart" class="btn">Restart</button>
        <button id="btnShop" class="btn">Shop</button>
      </div>
    </div>
  </div>
  <div id="modOverlay" class="overlay"></div>

<script>
const COLS = 10, ROWS = 20;
let BLOCK = 30;

const board = document.getElementById("board"), ctx = board.getContext("2d");
const nextCanvas = document.getElementById("nextCanvas"), nextCtx = nextCanvas.getContext("2d");
const holdCanvas = document.getElementById("holdCanvas"), holdCtx = holdCanvas.getContext("2d");

const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const linesEl = document.getElementById("lines");
const goalEl = document.getElementById("goal");
const modsListEl = document.getElementById("modsList");
const overlay = document.getElementById("modOverlay");

/* =========================
   CORE SYSTEM / UPGRADES
   - modifier system removed
   - shop upgrades apply effects directly and are tracked in `activeUpgrades`
========================= */

const gameState = {
  dropInterval: 800,
  controlsReversed: false,
  scoreMultiplier: 1,
  comboEnabled: false
};

let activeUpgrades = [];
let comboCount = 0;

// Per-run shop items (easy to extend). Each item has: id, name, cost, description
// and an `apply` function which receives `gameState` and may modify globals.
const SHOP_ITEMS = [
  { id: 'speed_boost', name: 'Faster Drops', cost: 50, description: 'Reduce drop interval by 15%', apply(s){ s.dropInterval *= 0.85; } },
  { id: 'extra_hold', name: 'Extra Hold', cost: 40, description: 'Start with a held I piece', apply(){ if(!hold) hold = makePiece('I'); renderPreviews(); } },
  { id: 'score_up', name: 'Score Booster', cost: 60, description: 'Permanent +25% score multiplier', apply(s){ s.scoreMultiplier *= 1.25; } },
  { id: 'combo_engine', name: 'Combo Engine', cost: 70, description: 'Gain bonus for consecutive line clears', apply(s){ s.comboEnabled = true; } },
  { id: 'gold_bonus', name: 'Gold Bounty', cost: 80, description: 'Gain +20% gold on level completion', apply(){ window._goldMultiplier = (window._goldMultiplier||1) + 0.2; } },
  { id: 'piece_bias_i', name: 'I Bias', cost: 65, description: 'Increase chance of I pieces', apply(){ window._pieceBias = window._pieceBias||{}; window._pieceBias.I = (window._pieceBias.I||0) + 0.2; } },
  { id: 'slow_down', name: 'Gentle Pace', cost: 55, description: 'Increase drop interval by 10% (easier)', apply(s){ s.dropInterval *= 1.10; } },
  { id: 'more_gold_end', name: 'Treasure Chest', cost: 100, description: 'Get extra flat gold at level up', apply(){ window._goldFlat = (window._goldFlat||0) + 30; } },
  { id: 'soft_drop_boost', name: 'Soft Drop Assist', cost: 45, description: 'Soft drop is slightly faster', apply(){ window._softDropMultiplier = (window._softDropMultiplier||1) * 0.9; } },
  { id: 'hold_swap_plus', name: 'Quick Swap', cost: 50, description: 'Reduce hold cooldown (allow more frequent holds)', apply(){ window._holdCoolDown = (window._holdCoolDown||1) * 0.8; } },
  { id: 'combo_plus', name: 'Combo Mastery', cost: 90, description: 'Increase combo bonuses', apply(){ window._comboBonus = (window._comboBonus||1) + 0.5; } },
  { id: 'score_mult_big', name: 'Scoring Matrix', cost: 120, description: 'Large score multiplier +50%', apply(s){ s.scoreMultiplier *= 1.5; } },
  { id: 'extra_gold_clear', name: 'Line Bounty', cost: 70, description: 'Gain extra gold per level (passive)', apply(){ window._extraGoldPerLevel = (window._extraGoldPerLevel||0) + 10; } },
  { id: 'piece_bias_t', name: 'T Bias', cost: 60, description: 'Increase chance of T pieces (more combos)', apply(){ window._pieceBias = window._pieceBias||{}; window._pieceBias.T = (window._pieceBias.T||0) + 0.15; } },
  { id: 'clear_random_line', name: 'Line Clearer', cost: 85, description: 'One-time use: Clear a random line on the board', apply(){ 
    if(grid.some(row => row.some(cell => cell))){
      const filledRows = grid.map((row, idx) => row.some(cell => cell) ? idx : null).filter(idx => idx !== null);
      const rowToClear = filledRows[Math.floor(Math.random() * filledRows.length)];
      grid.splice(rowToClear, 1);
      grid.unshift(Array(COLS).fill(null));
    }
   } }
];

// Shop pool refresh settings
let shopPool = [];
const SHOP_REFRESH_MS = 120000; // 2 minutes
function refreshShopPool(){ shopPool = [...SHOP_ITEMS].sort(()=>0.5-Math.random()); }
refreshShopPool();
setInterval(refreshShopPool, SHOP_REFRESH_MS);

/* =========================
   GAME STATE
========================= */

let grid=[], current=null, nextPiece=null, hold=null;
let canHold=true, score=0, level=1, lines=0;
let goalBase=5, dropCounter=0, lastTime=0;
let paused=false, gameOver=false;
let gold=0;

// Progressive difficulty settings (time-based)
let runtimeMs = 0;
const SPEEDUP_INTERVAL_MS = 30000; // every 30s
const SPEEDUP_FACTOR = 0.95; // multiply dropInterval by this
const MIN_DROP_INTERVAL = 80; // lower cap (ms)
let nextSpeedupAt = SPEEDUP_INTERVAL_MS;
// Garbage (ghost) lines settings
const GARBAGE_INTERVAL_MS = 45000; // every 45s
let nextGarbageAt = GARBAGE_INTERVAL_MS;

// Score thresholds for levels (easy to edit). Index = level number. Add more values to extend.
const LEVEL_SCORE_THRESHOLDS = [0, 500, 1500, 3000, 5000, 8000];

/* =========================
   PIECES
========================= */

const SHAPES = {
I:[[1,1,1,1]],
J:[[1,0,0],[1,1,1]],
L:[[0,0,1],[1,1,1]],
O:[[1,1],[1,1]],
S:[[0,1,1],[1,1,0]],
T:[[0,1,0],[1,1,1]],
Z:[[1,1,0],[0,1,1]]
};

const COLORS = {
I:"#60f",J:"#36c",L:"#f93",O:"#fc0",
S:"#2bfa8a",T:"#b76cff",Z:"#ff5c8a"
};

function makePiece(t=null){
  const keys = Object.keys(SHAPES);
  let type = null;

  if(t) type = t;
  else if(window._pieceBias){
    // weighted choice using biases on top of uniform weight
    const weights = keys.map(k => 1 + (window._pieceBias[k]||0));
    const sum = weights.reduce((a,b)=>a+b,0);
    let r = Math.random()*sum;
    for(let i=0;i<keys.length;i++){
      r -= weights[i];
      if(r <= 0){ type = keys[i]; break; }
    }
    if(!type) type = keys[Math.floor(Math.random()*keys.length)];
  } else {
    type = keys[Math.floor(Math.random()*keys.length)];
  }

  return {
    type,
    shape: SHAPES[type].map(r=>r.slice()),
    x: Math.floor((COLS - SHAPES[type][0].length)/2),
    y: -1,
    color: COLORS[type]
  };
}

function rotate(m){
  return m[0].map((_,i)=>m.map(r=>r[i]).reverse());
}

/* =========================
   GAME LOGIC
========================= */

function collides(p){
  for(let r=0;r<p.shape.length;r++)
  for(let c=0;c<p.shape[0].length;c++){
    if(!p.shape[r][c]) continue;
    let x=p.x+c,y=p.y+r;
    if(x<0||x>=COLS||y>=ROWS) return true;
    if(y>=0 && grid[y][x]) return true;
  }
  return false;
}

function merge(p){
  for(let r=0;r<p.shape.length;r++)
  for(let c=0;c<p.shape[0].length;c++){
    if(p.shape[r][c]){
      let x=p.x+c,y=p.y+r;
      if(y>=0) grid[y][x]=p.color;
    }
  }
}

function clearLines(){
  let cleared=0;

  for(let r=ROWS-1;r>=0;r--){
    if(grid[r].every(v=>v)){
      grid.splice(r,1);
      grid.unshift(Array(COLS).fill(null));
      cleared++; r++;
    }
  }

  if(cleared){
    // line clear handling with optional combo system
    lines += cleared;
    if(gameState.comboEnabled){
      comboCount = (comboCount||0) + 1;
      const comboBonus = ((comboCount-1) * 50) * (window._comboBonus || 1);
      score += cleared * 100 * level * gameState.scoreMultiplier + comboBonus;
    }else{
      comboCount = 0;
      score += cleared * 100 * level * gameState.scoreMultiplier;
    }

    // award gold per cleared line (base 10 per line), plus any flat bonuses and multipliers
    const baseLineGold = 10;
    const extraPerLine = window._extraGoldPerLevel || 0; // some shop items add this
    const goldMult = window._goldMultiplier || 1;
    const goldGain = Math.floor(cleared * (baseLineGold + extraPerLine) * goldMult);
    gold += goldGain;

    updateStats();
    checkLevel();
  }
  else {
    // no clear resets combo counter
    comboCount = 0;
  }
}

function addGarbageLines(n){
  for(let i=0;i<n;i++){
    // create garbage row with one random hole
    const hole = Math.floor(Math.random()*COLS);
    const row = Array.from({length:COLS},(_,c)=> c===hole ? null : '#222');
    // remove top row and push garbage at bottom
    grid.shift();
    grid.push(row);
  }
  // if current piece collides after garbage, game over
  if(current && collides(current)){
    gameOver = true;
  }
}

function showEndScreen(){
  paused = true;
  overlay.innerHTML = `
    <div style="max-width:520px;text-align:left">
      <h2>Run Over</h2>
      <div>Score: <strong>${score}</strong></div>
      <div>Level reached: <strong>${level}</strong></div>
      <div>Lines cleared: <strong>${lines}</strong></div>
      <div>Gold earned: <strong>${gold}</strong></div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="restartFromEnd()">Play Again</button>
        <button class="btn" onclick="overlay.classList.remove('active')">Close</button>
      </div>
    </div>`;
  overlay.classList.add('active');
}

function restartFromEnd(){
  overlay.classList.remove('active');
  restart();
}

/* =========================
   DRAW
========================= */

function drawCell(x,y,c,a=1){
  ctx.globalAlpha=a;
  ctx.fillStyle=c;
  ctx.fillRect(x*BLOCK+1,y*BLOCK+1,BLOCK-2,BLOCK-2);
  ctx.globalAlpha=1;
}

function drawPreview(ctx,p){
  const w=ctx.canvas.width,h=ctx.canvas.height;
  ctx.clearRect(0,0,w,h);

  if(!p) return;

  const cell=Math.min(w/(p.shape[0].length+1),h/(p.shape.length+1));
  const ox=(w-p.shape[0].length*cell)/2;
  const oy=(h-p.shape.length*cell)/2;

  for(let r=0;r<p.shape.length;r++)
  for(let c=0;c<p.shape[0].length;c++)
    if(p.shape[r][c]){
      ctx.fillStyle=p.color;
      ctx.fillRect(ox+c*cell,oy+r*cell,cell-4,cell-4);
    }
}

function drawBoard(){
  ctx.clearRect(0,0,board.width,board.height);

  for(let r=0;r<ROWS;r++)
  for(let c=0;c<COLS;c++)
    if(grid[r][c]) drawCell(c,r,grid[r][c]);

  if(current){
    let ghost={...current, y:current.y};

    while(!collides({...ghost,y:ghost.y+1})) ghost.y++;

    for(let r=0;r<ghost.shape.length;r++)
    for(let c=0;c<ghost.shape[0].length;c++)
      if(ghost.shape[r][c])
        drawCell(ghost.x+c,ghost.y+r,current.color,0.15);

    for(let r=0;r<current.shape.length;r++)
    for(let c=0;c<current.shape[0].length;c++)
      if(current.shape[r][c])
        drawCell(current.x+c,current.y+r,current.color);
  }
}

/* =========================
   FLOW
========================= */

function spawn(){
  if(!nextPiece) nextPiece=makePiece();

  current=nextPiece;
  nextPiece=makePiece();
  canHold=true;

  if(collides(current)) gameOver=true;

  renderPreviews();
}

function renderPreviews(){
  drawPreview(nextCtx,nextPiece);
  drawPreview(holdCtx,hold);
}

function hardDrop(){
  while(!collides({...current,y:current.y+1})) current.y++;
  merge(current); clearLines(); spawn();
}

function softDrop(){
  current.y++;
  if(collides(current)){
    current.y--;
    merge(current);
    clearLines();
    spawn();
  }
}

function holdPiece(){
  if(!canHold) return;

  if(!hold){
    hold={...current,shape:current.shape.map(r=>r.slice())};
    spawn();
  }else{
    let t={...hold,shape:hold.shape.map(r=>r.slice())};
    hold={...current,shape:current.shape.map(r=>r.slice())};
    current=t;
    current.x=Math.floor((COLS-current.shape[0].length)/2);
    current.y=-1;
  }

  canHold=false;
  renderPreviews();
}

/* old modifier-choice removed */

/* =========================
   UI
========================= */

function updateStats(){
  scoreEl.textContent=score;
  levelEl.textContent=level;
  linesEl.textContent=lines;
  // show next score goal for level-up
  const nextThreshold = LEVEL_SCORE_THRESHOLDS[level] || Math.floor(level * 1000);
  goalEl.textContent = nextThreshold;
  document.getElementById('gold').textContent = gold;
  document.getElementById('shopHint').textContent = `Next:${nextThreshold}`;

  modsListEl.innerHTML=activeUpgrades.length
    ? activeUpgrades.map(m=>`<div><strong>${m.name}</strong></div>`).join("")
    : "<em class='muted'>None</em>";
}

function checkLevel(){
  // level up by score thresholds
  const nextThreshold = LEVEL_SCORE_THRESHOLDS[level] || Math.floor(level * 1000);
  if(score>=nextThreshold){
    // reward gold for completing the level
    const baseGold = level * 30;
    const goldFlat = window._goldFlat || 0;
    const extraPerLevel = window._extraGoldPerLevel || 0;
    const mult = window._goldMultiplier || 1;
    const gain = Math.floor((baseGold + goldFlat + extraPerLevel) * mult);
    gold += gain;
    level++;
    gameState.dropInterval*=0.92;
    offerShop();
  }
}

/* =========================
   SHOP
========================= */

function getRandomShopItems(n){
  return [...shopPool].sort(()=>0.5-Math.random()).slice(0,n);
}

function offerShop(){
  paused=true;
  const c=getRandomShopItems(3);

  overlay.innerHTML = `
    <div style="max-width:680px">
      <h2>Shop - Choose an upgrade</h2>
      ${c.map((it,i)=>`
        <div class="choice" style="text-align:left">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>${it.name}</strong>
            <div class="muted">Cost: ${it.cost}</div>
          </div>
          <div class="muted">${it.description}</div>
          <div style="margin-top:8px;text-align:right"><button class="btn" onclick="buyShopItem(${i})">Buy</button></div>
        </div>
      `).join('')}
      <div style="margin-top:8px"><button class="btn" onclick="skipShop()">Skip</button></div>
    </div>`;

  overlay.classList.add('active');
  window._shopChoices = c;
}

function skipShop(){ overlay.classList.remove('active'); paused=false; }

function buyShopItem(i){
  const item = window._shopChoices[i];
  if(!item) return;
  if(gold < item.cost){ alert('Not enough gold'); return; }
  gold -= item.cost;
  // apply item and track it as an active upgrade
  if(item.apply) {
    try{ item.apply(gameState); }catch(e){ console.error(e); }
  }
  activeUpgrades.push(item);
  overlay.classList.remove('active');
  paused=false;
  updateStats();
}

// UI buttons
document.getElementById('btnPause').addEventListener('click', ()=>{
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? 'Resume' : 'Pause';
});
document.getElementById('btnRestart').addEventListener('click', restart);
document.getElementById('btnShop').addEventListener('click', ()=>{ if(!paused) paused=true; offerShop(); });

/* =========================
   INPUT
========================= */
window.addEventListener("keydown", e => {
  if (e.code === "Escape") {
    restart();
    return;
  }

  if (paused || gameOver || !current) return;

  let k = e.code;

  if (gameState.controlsReversed) {
    if (k === "ArrowLeft") k = "ArrowRight";
    else if (k === "ArrowRight") k = "ArrowLeft";
  }

  if (k === "ArrowLeft") {
    current.x--;
    if (collides(current)) current.x++;
  }
  else if (k === "ArrowRight") {
    current.x++;
    if (collides(current)) current.x--;
  }
  else if (k === "ArrowUp") {
    const old = current.shape.map(row => [...row]);

    current.shape = rotate(current.shape);

    if (collides(current)) {
      current.shape = old;
    }
  }
  else if (k === "ArrowDown") {
    softDrop();
  }
  else if (k === "Space") {
    hardDrop();
  }
  else if (k === "KeyC" || k === "ShiftLeft" || k === "ShiftRight") {
    holdPiece();
  }

  renderPreviews();
});

/* =========================
   LOOP
========================= */

function update(t=0){
  if(!lastTime) lastTime=t;
  const d=t-lastTime;
  lastTime=t;

  if(!paused && current && !gameOver){
    dropCounter+=d;
    runtimeMs += d;
    if(runtimeMs >= nextSpeedupAt){
      // apply time-based speedup
      gameState.dropInterval = Math.max(MIN_DROP_INTERVAL, Math.floor(gameState.dropInterval * SPEEDUP_FACTOR));
      nextSpeedupAt += SPEEDUP_INTERVAL_MS;
    }
    if(runtimeMs >= nextGarbageAt){
      // add garbage lines to increase difficulty
      const maxGarbage = Math.min(4, 1 + Math.floor(level/2));
      const count = 1 + Math.floor(Math.random()*maxGarbage);
      addGarbageLines(count);
      nextGarbageAt += GARBAGE_INTERVAL_MS;
    }
    if(dropCounter>gameState.dropInterval){
      softDrop();
      dropCounter=0;
    }
  }

  // if game over show end screen once
  if(gameOver && !overlay.classList.contains('active')){
    showEndScreen();
  }

  drawBoard();
  requestAnimationFrame(update);
}

/* =========================
   RESIZE
========================= */

function resizeBoard(){
  const wrap=document.querySelector(".boardWrap");
  const w=Math.min(wrap.clientWidth,window.innerWidth*0.9);
  const h=Math.min(window.innerHeight*0.9,w*2);

  const newW=Math.min(w,h/2);
  const newH=newW*2;

  board.width=newW;
  board.height=newH;

  BLOCK=newW/COLS;
}

window.addEventListener("resize",resizeBoard);
window.addEventListener("load",resizeBoard);

/* =========================
   RESET
========================= */

function restart(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  current=null; nextPiece=null; hold=null;
  canHold=true;

  score=0; level=1; lines=0;
  gold=0;
  paused=false; gameOver=false;

  gameState.dropInterval=800;
  gameState.controlsReversed=false;
  gameState.scoreMultiplier=1;

  activeUpgrades=[];

  // reset progressive difficulty timers
  runtimeMs = 0;
  nextSpeedupAt = SPEEDUP_INTERVAL_MS;
  nextGarbageAt = GARBAGE_INTERVAL_MS;

  resizeBoard();
  spawn();
  updateStats();
  requestAnimationFrame(update);
}

restart();
</script>
</body>
</html>
