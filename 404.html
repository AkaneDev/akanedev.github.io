<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCP Foundation Terminal</title>

<style>
html,body{
  margin:0;height:100%;
  background:#000;
  color:#33ff33;
  font-family:'Courier New',monospace;
  display:flex;
  flex-direction:column;
}

#terminal{
  flex-grow:1;
  padding:1rem;
  overflow-y:auto;
  white-space:pre-wrap;
  line-height:1.3;
  text-shadow:0 0 5px #33ff33;
  animation:flicker .2s infinite alternate;
}

#command{
  background:#000;
  border:none;
  color:#33ff33;
  font-family:inherit;
  font-size:1rem;
  padding:.5rem;
  width:100%;
  outline:none;
  caret-color:#33ff33;
  text-shadow:0 0 5px #33ff33;
}

/* scanlines (UNCHANGED) */
body::before{
  content:"";
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:999;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0,255,0,.05) 2px,
    rgba(0,255,0,.05) 3px
  );
}

@keyframes flicker{
  0%{opacity:1}
  100%{opacity:.97}
}

/* CHAOS MODE */
body.chaos{
  color:#ff2b2b;
  background:#050000;
}
</style>
</head>

<body>

<div id="terminal">SCP FOUNDATION SECURE TERMINAL v4.2.1 (Easter Egg)<br>LOGIN REQUIRED<br></div>
<input id="command" autocomplete="off" autofocus>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("command");

/* ================= BUFFER FIX ================= */
let buffer = "SCP FOUNDATION SECURE TERMINAL v4.2.1 (Easter Egg)\nLOGIN REQUIRED\n";

function write(text){
  buffer += text;
  terminal.textContent = buffer;
  terminal.scrollTop = terminal.scrollHeight;
}

function typeOut(text, speed=8, cb){
  let i = 0;
  (function loop(){
    if(i < text.length){
      write(text[i++]);
      setTimeout(loop, speed);
    } else if(cb) cb();
  })();
}

/* ================= STATE ================= */
let accessLevel = 0;
let awaitingPassword = false;
let maskedInput = "";
let failedAttempts = 0;
const maxAttempts = 3;

/* ================= HASHES ================= */
const HASHES = {
  3: "b728da4767ae24798b18ca6c287183ba48584b9a7146f89a5c4f3b26b8124cf0",
  4: "9b2db965093728d240bf9a28d97c58c9b5faf2c8823864590f9c9fe3cd237f1a",
  5: "06a76d6ee26f61e9ba6fa9d3a5d42d987e45f77f1b77508f0e89f47780613312",
  6: "27b1c6879f758f00bcb90b3b966956847b8f1d7e54a671abc8bb9f690e0771ae",
  7: "f7349f611563791a9c93a6293e786b91ae1fb855a57d937b4bae48f5378cf06a"
};

/* ================= UI THEMES ================= */
function updateUI(){
  if(accessLevel === 7){
    document.body.classList.add("chaos");
  } else {
    document.body.classList.remove("chaos");
  }
}

/* ================= ROLE ================= */
function roleText(){
  switch(accessLevel){
    case 3: return "ACCESS LEVEL 3 - RESEARCHER";
    case 4: return "ACCESS LEVEL 4 - SENIOR RESEARCHER";
    case 5: return "ACCESS LEVEL 5 - ADMINISTRATOR";
    case 6: return "ACCESS LEVEL O5 - COUNCIL";
    case 7: return "ACCESS LEVEL CHAOS INSURGENCY - BREACH ACTIVE";
    default: return "ACCESS LEVEL 0 - UNAUTHORIZED";
  }
}

/* ================= LOGIN ================= */
async function sha256Hex(txt){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
  return [...new Uint8Array(buf)]
    .map(b=>b.toString(16).padStart(2,"0"))
    .join("");
}

async function checkPassword(pass){
  const hash = await sha256Hex(pass);
  for(const lvl in HASHES){
    if(hash === HASHES[lvl]) return Number(lvl);
  }
  return 0;
}

/* ================= OLD HELP RESTORED ================= */
const HELP_TEXT = `AVAILABLE COMMANDS:
login                 - Access system
logout                - End session
list                  - List SCP files
view SCP-049          - View SCP file
ls /mnt/networkshare/scpfs - List files in mounted read-only drive
read <path>           - Read file in /mnt/networkshare/scpfs (RO)
level                 - Show current access level
clear                 - Clear terminal`;

/* ================= COMMANDS ================= */
const basicCmds = {
  help: () => HELP_TEXT,

  level: () => roleText(),

  clear: () => {
    buffer = "";
    terminal.textContent = "";
    return "";
  },

  logout: () => {
    accessLevel = 0;
    updateUI();
    return "LOGOUT SUCCESSFUL\nSEE YOU SOON, ████████████";
  }
};

/* ================= INPUT ================= */
input.addEventListener("keydown", async e => {

/* PASSWORD MODE */
if(awaitingPassword){
  if(e.key === "Enter"){
    const pass = maskedInput;
    maskedInput = "";
    input.value = "";
    input.disabled = true;

    write("\n" + "*".repeat(pass.length) + "\n");

    const result = await checkPassword(pass);

    if(result > 0){
      accessLevel = result;
      awaitingPassword = false;
      failedAttempts = 0;

      updateUI();

      typeOut("ACCESS GRANTED\n" + roleText() + "\n",10,()=>{
        input.disabled=false;
        input.focus();
      });

    } else {
      failedAttempts++;
      awaitingPassword = failedAttempts < maxAttempts;

      typeOut(
        failedAttempts >= maxAttempts
          ? "TERMINAL LOCKED\n"
          : "INCORRECT PASSWORD\n",
        10,
        ()=>{input.disabled=false;input.focus();}
      );
    }
    return;
  }

  if(e.key === "Backspace"){
    maskedInput = maskedInput.slice(0,-1);
    input.value = "*".repeat(maskedInput.length);
    e.preventDefault();
    return;
  }

  if(e.key.length === 1){
    maskedInput += e.key;
    input.value = "*".repeat(maskedInput.length);
    e.preventDefault();
    return;
  }

  e.preventDefault();
  return;
}

/* NORMAL MODE */
if(e.key !== "Enter") return;

const entry = input.value.trim();
input.value = "";
input.disabled = true;

write(`\n> ${entry}\n`);

/* LOGIN */
if(entry === "login"){
  awaitingPassword = true;
  maskedInput = "";

  typeOut("ENTER PASSWORD: ",10,()=>{
    input.disabled=false;
    input.focus();
  });
  return;
}

/* BLOCK UNAUTH */
if(accessLevel === 0 && !["help","clear"].includes(entry)){
  typeOut("ACCESS DENIED.\n",10,()=>{
    input.disabled=false;
    input.focus();
  });
  return;
}

/* COMMAND PARSE */
const [cmd] = entry.split(" ");
let output = "";

switch(cmd){

  case "help":
    output = basicCmds.help();
    break;

  case "level":
    output = basicCmds.level();
    break;

  case "clear":
    output = basicCmds.clear();
    break;

  case "logout":
    output = basicCmds.logout();
    break;

  default:
    output = "UNKNOWN COMMAND";
}

typeOut(output + "\n",10,()=>{
  input.disabled=false;
  input.focus();
});

});

document.addEventListener("click",()=>input.focus());
</script>

</body>
</html>
